# @package _global_
name: crossq

# CrossQ (SBX/JAX) — batch-normalised critic, very sample-efficient.
# GPU on cluster requires: pip install -U "jax[cuda12]"
# MPS is not supported by JAX; device=mps falls back to CPU automatically.

buffer_size: 1000000
n_steps: 1000000
batch_size: 256

rl:
  gamma: 0.99
  tau: 0.005
  learning_rate: 1e-4      # actor LR (CrossQ paper default)
  qf_learning_rate: 1e-3   # critic LR (CrossQ paper default)
  ent_coef: auto
  gradient_steps: 1
  policy_delay: 1

evaluation:
  evaluate_episodes: 5
  eval_interval: 5000

warmup:
  warmup_steps: 25000
