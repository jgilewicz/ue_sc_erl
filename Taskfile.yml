# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  run-all:
    desc: "Run TD3, ERL, SC-ERL and PPO for seeds 0,1,2 on Pendulum"
    cmds:
      - |
        for seed in 0 1 2; do
          uv run python entry_point.py algorithm=td3 seed=$seed wandb.name="td3_seed${seed}" wandb.tags="[Pendulum,TD3,baseline]"
          uv run python entry_point.py algorithm=erl seed=$seed wandb.name="erl_seed${seed}" wandb.tags="[Pendulum,ERL,baseline]"
          uv run python entry_point.py algorithm=sc_erl seed=$seed wandb.name="sc_erl_seed${seed}" wandb.tags="[Pendulum,SC_ERL,baseline]"
          uv run python entry_point.py algorithm=ppo seed=$seed wandb.name="ppo_seed${seed}" wandb.tags="[Pendulum,PPO,baseline]"
        done

  run-fetch-matrix:
    desc: "Runs the full experiment matrix for Fetch robots (4 environments x 5 seeds x algorithms)"
    cmds:
      - |
        for env in FetchReachDense-v4 FetchPushDense-v4 FetchSlideDense-v4 FetchPickAndPlaceDense-v4; do
          for seed in 0 1 2 3 4; do
            echo "=== Running: ENVIRONMENT=$env | SEED=$seed ==="
            
            # 1. Classical baseline TD3
            uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name="td3_${env}_seed${seed}" wandb.tags="[Fetch,td3,baseline]"
            
            # 2. Hybrid baseline ERL
            uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name="erl_${env}_seed${seed}" wandb.tags="[Fetch,erl,baseline]"
            
            # 3. Baseline On-Policy PPO
            uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name="ppo_${env}_seed${seed}" wandb.tags="[Fetch,ppo,baseline]"
            
            # 4. Your SC-ERL with gating using MC-Dropout
            uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name="sc_erl_dropout_${env}_seed${seed}" wandb.tags="[Fetch,sc_erl,dropout]"
            
            # 5. Your SC-ERL with gating using Deep Ensembles
            uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name="sc_erl_ensemble_${env}_seed${seed}" wandb.tags="[Fetch,sc_erl,ensemble]"
            
          done
        done

  run-fetch-parallel:
    desc: "Runs the experiment matrix in parallel (Warning: uses more CPU/VRAM)"
    cmds:
      - |
        commands=()
        for env in FetchReachDense-v4 FetchPushDense-v4 FetchSlideDense-v4 FetchPickAndPlaceDense-v4; do
          for seed in 0 1 2 3 4; do
            commands+=("uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name=\"td3_${env}_seed${seed}\" wandb.tags=\"[Fetch,td3,baseline]\"")
            commands+=("uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[Fetch,erl,baseline]\"")
            commands+=("uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name=\"ppo_${env}_seed${seed}\" wandb.tags=\"[Fetch,ppo,baseline]\"")
            commands+=("uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[Fetch,sc_erl,dropout]\"")
            commands+=("uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[Fetch,sc_erl,ensemble]\"")
          done
        done
        
        printf "%s\n" "${commands[@]}" | xargs -I {} -P 3 bash -c '{}'

  clean:
    desc: "Clean outputs and Hydra logs"
    cmds:
      - rm -rf outputs .hydra
