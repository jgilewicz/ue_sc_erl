# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Sanity-check: ERL (baseline) vs SC-ERL/Ensemble (po poprawkach Phase 1)
# Środowisko: Hopper-v5 | Seed: 42 | 1M kroków
#
# Użycie:
#   task -t Taskfile.sanitycheck.yml compare    # ERL + SC-ERL równolegle (domyślne)
#   task -t Taskfile.sanitycheck.yml erl        # tylko ERL
#   task -t Taskfile.sanitycheck.yml sc-erl     # tylko SC-ERL/Ensemble

version: '3'

vars:
  ENV: Hopper-v5
  SEED: "42"
  STEPS: "1000000"
  # Wspólny tag grupujący oba runy w W&B
  GROUP_TAG: SanityCheck-Phase1Fix

tasks:
  default:
    desc: "Pokaż dostępne taski sanity-check"
    cmds:
      - task -t Taskfile.sanitycheck.yml --list
    silent: true

  erl:
    desc: "Baseline ERL | Hopper-v5 | seed=42 | 1M kroków"
    cmds:
      - |
        uv run python entry_point.py \
          algorithm=erl \
          seed={{.SEED}} \
          env.id={{.ENV}} \
          eval_env.id={{.ENV}} \
          n_steps={{.STEPS}} \
          wandb.enabled=true \
          "wandb.name=erl_{{.ENV}}_seed{{.SEED}}_sanity" \
          "wandb.tags=[{{.GROUP_TAG}},erl,baseline,seed{{.SEED}}]" \
          "hydra.run.dir=outputs/sanity/erl_seed{{.SEED}}"

  sc-erl:
    desc: "SC-ERL/Ensemble (patched) | Hopper-v5 | seed=42 | 1M kroków"
    cmds:
      - |
        uv run python entry_point.py \
          algorithm=sc_erl \
          surrogate.mode=ensemble \
          seed={{.SEED}} \
          env.id={{.ENV}} \
          eval_env.id={{.ENV}} \
          n_steps={{.STEPS}} \
          wandb.enabled=true \
          "wandb.name=sc_erl_ensemble_{{.ENV}}_seed{{.SEED}}_sanity" \
          "wandb.tags=[{{.GROUP_TAG}},sc_erl,ensemble,seed{{.SEED}}]" \
          "hydra.run.dir=outputs/sanity/sc_erl_ensemble_seed{{.SEED}}"

  compare:
    desc: "ERL vs SC-ERL/Ensemble równolegle — head-to-head comparison"
    deps:
      - task: erl
      - task: sc-erl
